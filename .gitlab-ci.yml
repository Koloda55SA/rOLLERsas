image: gradle:8.7-jdk17

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  ANDROID_SDK_ROOT: "/opt/android-sdk"
  ANDROID_CMDLINE_VERSION: "11076708"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/

stages:
  - build
  - deploy

build_debug_apk:
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget unzip > /dev/null
    - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_VERSION}_latest.zip -O /tmp/cmdline.zip
    - unzip -q /tmp/cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools
    - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
    - export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
    - yes | sdkmanager --licenses > /dev/null || true
    - sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null
  script:
    - gradle assembleDebug --stacktrace
  artifacts:
    name: "rollerdrome-debug-apk"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH'

deploy_firestore_rules:
  stage: deploy
  image: node:20-slim
  allow_failure: true
  before_script:
    - npm install -g firebase-tools
  script:
    - firebase deploy --only firestore:rules --project antiscamchat --token "$FIREBASE_TOKEN"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - firestore.rules
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - firestore.rules
